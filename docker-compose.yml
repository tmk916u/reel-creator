services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reel
      POSTGRES_PASSWORD: reel
      POSTGRES_DB: reel
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reel"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-tmp:/app/tmp
      - media-storage:/app/media
      - hf-cache:/root/.cache/huggingface
    env_file: ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/root/.cache/huggingface
      - DATABASE_URL=postgresql+psycopg2://reel:reel@db:5432/reel
      - MEDIA_DIR=/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_BUILD_LABEL=main
    depends_on:
      - backend

volumes:
  backend-tmp:
  hf-cache:
  db-data:
  media-storage:
